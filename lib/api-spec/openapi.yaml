openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GHRI Foundation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: contact
  - name: volunteer
  - name: newsletter
  - name: stats
  - name: telehealth-auth
  - name: telehealth-appointments
  - name: telehealth-messages
  - name: telehealth-documents
  - name: telehealth-prescriptions
  - name: telehealth-admin
  - name: patient-intake
  - name: volunteer-auth
  - name: volunteer-training
  - name: volunteer-waivers
  - name: volunteer-hours
  - name: volunteer-events
  - name: volunteer-messages
  - name: volunteer-impact
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /volunteer:
    post:
      operationId: submitVolunteer
      tags: [volunteer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactStats"

  /blog:
    get:
      operationId: getBlogPosts
      tags: [stats]
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  # ── Telehealth Auth ────────────────────────────────────────────────────────

  /telehealth/auth/register:
    post:
      operationId: telehealthRegister
      tags: [telehealth-auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelehealthRegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelehealthAuthResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/auth/login:
    post:
      operationId: telehealthLogin
      tags: [telehealth-auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelehealthLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelehealthLoginSuccess"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/auth/mfa/setup:
    post:
      operationId: telehealthMfaSetup
      tags: [telehealth-auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/auth/mfa/verify:
    post:
      operationId: telehealthMfaVerify
      tags: [telehealth-auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyInput"
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelehealthAuthResponse"
        "401":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/auth/me:
    get:
      operationId: telehealthMe
      tags: [telehealth-auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelehealthUserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/auth/logout:
    post:
      operationId: telehealthLogout
      tags: [telehealth-auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Appointments ───────────────────────────────────────────────────────────

  /telehealth/appointments:
    get:
      operationId: getAppointments
      tags: [telehealth-appointments]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAppointment
      tags: [telehealth-appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [telehealth-appointments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Messages ───────────────────────────────────────────────────────────────

  /telehealth/messages:
    get:
      operationId: getMessages
      tags: [telehealth-messages]
      security:
        - bearerAuth: []
      parameters:
        - name: withUserId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [telehealth-messages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageCreateInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Documents ──────────────────────────────────────────────────────────────

  /telehealth/documents:
    get:
      operationId: getDocuments
      tags: [telehealth-documents]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicalDocument"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadDocument
      tags: [telehealth-documents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUploadInput"
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalDocument"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Prescriptions ──────────────────────────────────────────────────────────

  /telehealth/prescriptions:
    get:
      operationId: getPrescriptions
      tags: [telehealth-prescriptions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrescriptionWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPrescription
      tags: [telehealth-prescriptions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionCreateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionWithUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Providers only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Providers & Patients ───────────────────────────────────────────────────

  /telehealth/providers:
    get:
      operationId: getProviders
      tags: [telehealth-appointments]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelehealthUserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/patients:
    get:
      operationId: getPatients
      tags: [telehealth-admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelehealthUserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Providers only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/audit-logs:
    get:
      operationId: getAuditLogs
      tags: [telehealth-admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /telehealth/intake:
    get:
      operationId: getIntakeForm
      tags: [patient-intake]
      summary: Get patient intake form
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Intake form or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeFormResponse"
    post:
      operationId: submitIntakeForm
      tags: [patient-intake]
      summary: Create or update intake form
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeFormInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeFormResponse"

  /volunteers/auth/register:
    post:
      operationId: volRegister
      tags: [volunteer-auth]
      summary: Register as volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolRegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolAuthResponse"

  /volunteers/auth/login:
    post:
      operationId: volLogin
      tags: [volunteer-auth]
      summary: Login to volunteer portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolAuthResponse"

  /volunteers/auth/logout:
    post:
      operationId: volLogout
      tags: [volunteer-auth]
      summary: Logout from volunteer portal
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object

  /volunteers/auth/me:
    get:
      operationId: volMe
      tags: [volunteer-auth]
      summary: Get current volunteer profile
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolUserProfile"

  /volunteers/training:
    get:
      operationId: getVolTraining
      tags: [volunteer-training]
      summary: List training resources with completion status
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Training resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolTrainingResource"

  /volunteers/training/{id}/complete:
    post:
      operationId: completeVolTraining
      tags: [volunteer-training]
      summary: Mark training resource as complete
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolCompleteTrainingInput"
      responses:
        "200":
          description: Completed

  /volunteers/waivers:
    get:
      operationId: getVolWaivers
      tags: [volunteer-waivers]
      summary: List waivers with signature status
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Waivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolWaiver"

  /volunteers/waivers/{id}/sign:
    post:
      operationId: signVolWaiver
      tags: [volunteer-waivers]
      summary: Sign a waiver
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolWaiverSignInput"
      responses:
        "200":
          description: Signed

  /volunteers/hours:
    get:
      operationId: getVolHours
      tags: [volunteer-hours]
      summary: List service hours
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Hours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolServiceHoursEntry"
    post:
      operationId: logVolHours
      tags: [volunteer-hours]
      summary: Log service hours
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolHoursInput"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolServiceHoursEntry"

  /volunteers/hours/{id}:
    patch:
      operationId: reviewVolHours
      tags: [volunteer-hours]
      summary: Approve or reject service hours (coordinator only)
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolHoursUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolServiceHoursEntry"

  /volunteers/events:
    get:
      operationId: getVolEvents
      tags: [volunteer-events]
      summary: List volunteer events
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolEvent"
    post:
      operationId: createVolEvent
      tags: [volunteer-events]
      summary: Create event (coordinator only)
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolEvent"

  /volunteers/events/{id}/register:
    post:
      operationId: registerVolEvent
      tags: [volunteer-events]
      summary: Register for event
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registered
    delete:
      operationId: cancelVolEventRegistration
      tags: [volunteer-events]
      summary: Cancel event registration
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled

  /volunteers/messages:
    get:
      operationId: getVolMessages
      tags: [volunteer-messages]
      summary: Get messages
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolMessage"
    post:
      operationId: sendVolMessage
      tags: [volunteer-messages]
      summary: Send a message
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolMessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolMessage"

  /volunteers/impact:
    get:
      operationId: getVolImpact
      tags: [volunteer-impact]
      summary: Get impact metrics
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolImpactMetrics"

  /volunteers/coordinators:
    get:
      operationId: getVolCoordinators
      tags: [volunteer-messages]
      summary: List coordinators (for messaging)
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Coordinators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolUserProfile"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        subject:
          type: ["string", "null"]
        message:
          type: string
          minLength: 1

    VolunteerInput:
      type: object
      required: [name, email, profession, interestArea]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        profession:
          type: string
        interestArea:
          type: string
          enum:
            - healthcare_professional
            - student_volunteer
            - community_outreach
            - fundraising
            - technology

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        name:
          type: ["string", "null"]

    ImpactStats:
      type: object
      properties:
        ruralCommunitiesReached:
          type: integer
        healthcarePartnerships:
          type: integer
        volunteerProfessionals:
          type: integer
        livesImpacted:
          type: integer
      required:
        - ruralCommunitiesReached
        - healthcarePartnerships
        - volunteerProfessionals
        - livesImpacted

    BlogPost:
      type: object
      required: [id, title, excerpt, category, publishedAt, slug]
      properties:
        id:
          type: integer
        title:
          type: string
        excerpt:
          type: string
        category:
          type: string
        publishedAt:
          type: string
        slug:
          type: string
        imageUrl:
          type: ["string", "null"]

    # ── Telehealth Schemas ───────────────────────────────────────────────────

    TelehealthRegisterInput:
      type: object
      required: [email, password, name, role, consentedToTerms]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
        role:
          type: string
          enum: [patient, provider]
        specialty:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        consentedToTerms:
          type: boolean

    TelehealthLoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TelehealthLoginSuccess:
      type: object
      required: [token, user, mfaRequired]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/TelehealthUserProfile"
        mfaRequired:
          type: boolean
        mfaSetupRequired:
          type: boolean

    TelehealthAuthResponse:
      type: object
